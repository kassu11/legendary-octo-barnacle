<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/legendary-octo-barnacle/vite.svg" />
    <link rel="manifest" href="/legendary-octo-barnacle/manifest.json" />
    <meta name="theme-color" content="#000000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>LOB</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      const pathSegmentsToKeep = 1;

      const l = window.location;

      const sp = new URLSearchParams(l.search);
      let search = l.search;
      if (sp.has("dev-branch")) {
        window.localStorage.LOB_DEV_BRANCH = sp.get("dev-branch");
        sp.delete("dev-branch");
        search = sp.toString();
      }

      const s = window.sessionStorage.LOB_DEV_BRANCH;
      const b = window.localStorage.LOB_DEV_BRANCH;
      delete window.sessionStorage.LOB_DEV_BRANCH;
      const path = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');

      // If branch was found inside sessionStorage we were redirected to this index page
      if (s) {
        // Redirect cleared localStorage so lets save this branch again
        window.localStorage.LOB_DEV_BRANCH = s;
      }
      // You landed on index.html wihout redirect, but you want to go to other branch
      else if (b && !l.pathname.includes(b)) {
        window.sessionStorage.LOB_DEV_BRANCH = b;
        // If this redirect forwards you to 404 page the 404 page will clear localStorage and redirect you back to main branch
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          path + "/branches/" + b + search + l.hash
        );
      }

      if (search[1] === '/' ) {
        var decoded = search.slice(1).split('&').map(s => s.replace(/~and~/g, '&')).join('?');
        window.history.replaceState(null, null, path + decoded + l.hash);
      } else if (l.pathname.includes("/branches/")) {
        window.history.replaceState(null, null, path + search + l.hash);
      }

    </script>
    <script type="module" crossorigin src="/legendary-octo-barnacle/assets/index-CIg6UtZb.js"></script>
    <link rel="stylesheet" crossorigin href="/legendary-octo-barnacle/assets/index-83G2DOiF.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
