<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Single Page Apps for GitHub Pages</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script takes the current url and converts the path and query
      // string into just a query string, and then redirects the browser
      // to the new url with only a query string and hash fragment,
      // e.g. https://www.foo.tld/one/two?a=b&c=d#qwe, becomes
      // https://www.foo.tld/?/one/two&a=b~and~c=d#qwe
      // Note: this 404.html file must be at least 512 bytes for it to work
      // with Internet Explorer (it is currently > 512 bytes)

      // If you're creating a Project Pages site and NOT using a custom domain,
      // then set pathSegmentsToKeep to 1 (enterprise users may need to set it to > 1).
      // This way the code will only replace the route part of the path, and not
      // the real directory in which the app resides, for example:
      // https://username.github.io/repo-name/one/two?a=b&c=d#qwe becomes
      // https://username.github.io/repo-name/?/one/two&a=b~and~c=d#qwe
      // Otherwise, leave pathSegmentsToKeep as 0.
      var pathSegmentsToKeep = 1;

      const l = window.location;

      const sp = new URLSearchParams(l.search);
      let search = l.search;
      if (sp.has("dev-branch")) {
        window.localStorage.LOB_DEV_BRANCH = sp.get("dev-branch");
        sp.delete("dev-branch");
        search = sp.toString();
      }

      const b = window.localStorage.LOB_DEV_BRANCH;
      const s = window.sessionStorage.LOB_DEV_BRANCH;
      // Session branch can only be found if this is the second redirect and
      // because we are in 404 file we know the second redirect failed.
      // Remove the incorrect branch name from url and redirect to root index.html
      const path = s ? l.pathname.replace("/branches/" + s, "") : l.pathname;

      // Clear all branch names from memory
      delete window.sessionStorage.LOB_DEV_BRANCH;
      delete window.localStorage.LOB_DEV_BRANCH;
      if (b) {
        // Place branch name to sessionStorage where index.html will check if this is found
        // If session storage is found we can assume that the redirect was successfull
        window.sessionStorage.LOB_DEV_BRANCH = b;
      }

      const branch = b ? "/branches/" + b : "";

      // Already encrypted
      if (search[1] === '/') {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          path.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
          search + l.hash
        );
      }
      else {
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          path.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + branch + '/?/' +
          path.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (search ? '&' + search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      }

    </script>
  </head>
  <body>
  </body>
</html>
