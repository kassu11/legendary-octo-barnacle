<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/legendary-octo-barnacle/branches/feature-add-sorting-options-to-compare-page/vite.svg" />
    <link rel="manifest" href="/legendary-octo-barnacle/branches/feature-add-sorting-options-to-compare-page/manifest.json" />
    <meta name="theme-color" content="#000000">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <title>LOB</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string,
      // converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which won't cause the browser to attempt to load the new url.
      // When the single page app is loaded further down in this file,
      // the correct url will be waiting in the browser's history for
      // the single page app to route accordingly.
      (l => {
        const pathSegmentsToKeep = 1;
        // Remove dev-branch and set the value to localStorage
        let search = l.search.replace(/dev-branch=([^&]+)&?|&?dev-branch=([^&]+)/g, (match, n, name = n) => {
          if (name) window.localStorage.LOB_DEV_BRANCH = name
          return "";
        });
        if (search === "?") search = "";

        const sb = window.sessionStorage.LOB_DEV_BRANCH;
        const lb = window.localStorage.LOB_DEV_BRANCH;
        delete window.sessionStorage.LOB_DEV_BRANCH;
        const path = l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');

        // If branch was found inside sessionStorage we were redirected to this index page
        if (sb) {
          // Redirect cleared localStorage so lets save this branch again
          window.localStorage.LOB_DEV_BRANCH = sb;
        }
        // You landed on index.html file without redirect, but
        // 1. you are on wrong branch html file
        // 2. you wanted to go to main, but are on a branch html file
        else if ((lb && !l.pathname.endsWith("/" + lb + "/")) || (!lb && l.pathname.includes("/branches/"))) {
          if (lb) window.sessionStorage.LOB_DEV_BRANCH = lb;

          // If this redirect forwards you to 404 page the 404 page will clear localStorage and redirect you back to main branch
          const branch = lb ? "/branches/" + lb : "";
          return l.replace(
            l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
            path + branch + '/?/' +
            l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
            (search ? '&' + search.slice(1).replace(/&/g, '~and~') : '') +
            l.hash
          );
        }

        if (search[1] === '/' ) {
          var decoded = search.slice(1).split('&').map(s => s.replace(/~and~/g, '&')).join('?');
          window.history.replaceState(null, null, path + decoded + l.hash);
        }
      })(window.location)

    </script>
    <script type="module" crossorigin src="/legendary-octo-barnacle/branches/feature-add-sorting-options-to-compare-page/assets/index-DVCbB-rP.js"></script>

  </head>

    <div id="root"></div>
  </body>
</html>
